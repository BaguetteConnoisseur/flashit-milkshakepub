services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - db

  backend:
    build: 
      context: ./docker/backend
    volumes:
      - .:/var/www/html
    environment:
      - MYSQL_DATABASE=flashit_bestallningsark

  websocket:
    build: ./docker/websocket
    ports:
      - "8081:8081"

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flashit_bestallningsark
    volumes:
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql