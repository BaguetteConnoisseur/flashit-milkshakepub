services:
  frontend:
    image: nginx:1.27-alpine
    container_name: flashit-frontend
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
    networks:
      - flashit-network

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: flashit-backend
    volumes:
      - ./:/var/www
    environment:
      DB_HOST: flashit-milkshakepub-db
      DB_NAME: ${MYSQL_DATABASE:-flashit_milkshakepub}
      DB_USER: ${MYSQL_USER:-flashit}
      DB_PASS: ${MYSQL_PASSWORD:-flashit_pass}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-CHANGE_ME}
      BASE_PATH: ${BASE_PATH:-}
    depends_on:
      flashit-milkshakepub-db:
        condition: service_healthy
    networks:
      - flashit-network

  flashit-milkshakepub-db:
    image: mysql:8.4
    container_name: flashit-milkshakepub-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-flashit_milkshakepub}
      MYSQL_USER: ${MYSQL_USER:-flashit}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-flashit_pass}
    volumes:
      - flashit_milkshakepub_db_data:/var/lib/mysql
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - flashit-network

volumes:
  flashit_milkshakepub_db_data:

networks:
  flashit-network:
    driver: bridge

